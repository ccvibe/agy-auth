name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            pkg_dir: darwin-x64
            bin_name: agy-auth
          - target: aarch64-apple-darwin
            os: macos-latest
            pkg_dir: darwin-arm64
            bin_name: agy-auth
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            pkg_dir: linux-x64
            bin_name: agy-auth
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            pkg_dir: win32-x64
            bin_name: agy-auth.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}
        shell: bash
        env:
          CARGO_HTTP_MULTIPLEXING: false
          CARGO_NET_RETRY: 5
          CARGO_HTTP_TIMEOUT: 120

      - name: Copy Binary to Package
        run: |
          mkdir -p npm/${{ matrix.pkg_dir }}
          cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} npm/${{ matrix.pkg_dir }}/
        shell: bash

      - name: Publish Platform Package
        run: |
          cd npm/${{ matrix.pkg_dir }}
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version $VERSION --no-git-tag-version --allow-same-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash

  publish-main:
    name: Publish Main Package
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Publish Main Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Update version in main package.json
          npm version $VERSION --no-git-tag-version --allow-same-version
          
          # Update version in optionalDependencies
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            for (const key of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[key] = '^' + '$VERSION';
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
